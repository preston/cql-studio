<div class="col-12 p-4 d-flex justify-content-between align-items-center">
    <div>
        <button [id]="'save-settings-btn' + idSuffix()" class="btn btn-primary" (click)="onSave()">
            <span class="bi bi-file-check"></span> Save to Browser
        </button>
    </div>
    <div class="d-flex align-items-center gap-2">
        <button [id]="'export-settings-btn' + idSuffix()" class="btn btn-outline-secondary btn-sm" (click)="onExport()">
            <span class="bi bi-download"></span> Export
        </button>
        <button [id]="'import-settings-btn' + idSuffix()" class="btn btn-outline-secondary btn-sm" (click)="onImport()">
            <span class="bi bi-upload"></span> Import
        </button>
        <button [id]="'reset-clipboard-btn' + idSuffix()" class="btn btn-outline-secondary btn-sm" (click)="onResetClipboard()">
            <span class="bi bi-clipboard-x"></span> Reset Clipboard
        </button>
        <button [id]="'reset-settings-btn' + idSuffix()" class="btn" (click)="onRestore()">
            <span class="bi bi-arrow-counterclockwise"></span> Reset to Defaults
        </button>
    </div>
</div>
